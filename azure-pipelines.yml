# Práctica 5 - Azure DevOps Pipelines (dummy)
#
# Punto de partida: pipeline mínimo para validar que Azure DevOps lee el repo de GitHub
# y ejecuta un YAML sin errores.

trigger: 
- main

pool:
  vmImage: ubuntu-latest

steps:
- script: |
    echo "Repository: $(Build.Repository.Name)"
    echo "Branch:     $(Build.SourceBranch)"
    echo "Commit:     $(Build.SourceVersion)"
  displayName: "Mostrar variables del build"
