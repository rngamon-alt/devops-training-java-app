# Práctica 5 - Azure DevOps Pipelines 
# Ejercicio 7 - CD condicionado por rama + parametro RUN_CD

parameters:
- name: RUN_CD
  type: boolean
  default: false

trigger:
- develop
- master

pr:
- develop
- master

# -------------------
# STAGE 1 - CI
# -------------------
stages:
- stage: CI
  displayName: "CI Stage"
  jobs:

    - job: CI_Java
      displayName: "CI - Java (Maven)"
      container: maven:3.8.6-openjdk-11-slim
      steps:
        - checkout: self
        - script: make lint
          displayName: "Compile Check (Lint)"
        - script: make test
          displayName: "Run Unit Tests"

    - job: Docker_Build
      displayName: "Build Docker Image"
      dependsOn: CI_Java
      condition: succeeded()
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self
        - script: docker build -f devops/Dockerfile -t myapp:$(Build.BuildId) .
          displayName: "Docker Build"

# -------------------
# STAGE 2 - CD
# -------------------
- stage: CD
  displayName: "Deploy Stage"
  condition: |
    and(
      succeeded(),
      eq('${{ parameters.RUN_CD }}', 'true'),
      or(
        eq(variables['Build.SourceBranchName'], 'develop'),
        eq(variables['Build.SourceBranchName'], 'master')
      )
    )
  jobs:
    - job: Deploy
      displayName: "Deploy Job"
      pool:
        vmImage: ubuntu-latest
      steps:
        - script: |
            if [ "$(Build.SourceBranchName)" = "develop" ]; then
              echo "Deploying to DEV environment..."
            elif [ "$(Build.SourceBranchName)" = "master" ]; then
              echo "Deploying to PRO environment..."
            fi
          displayName: "Deploy based on branch"
